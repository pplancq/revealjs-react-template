name: Init Template

on:
  push:
    branches:
      - main

env:
  HUSKY: 0

jobs:
  init:
    if: github.run_number == 1 && !github.event.repository.is_template
    name: Initialize repository from template
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: pplancq/actions/setup-node@7cc5778a60fe01a52eff971834f53b2a6201363d # v1.1.1
        with:
          use-mise: 'true'

      - name: Run init script
        run: node scripts/init-template.js

      - name: Remove init files and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm scripts/init-template.js
          git rm .github/workflows/init-template.yaml
          git add package.json package-lock.json
          git commit -m "chore: initialize repository from template"
          git push
