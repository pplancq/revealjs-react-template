name: Init Template

on:
  push:
    branches:
      - main

env:
  HUSKY: 0

jobs:
  init:
    if: github.run_number == 1 && !github.event.repository.is_template
    name: Initialize repository from template
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node
        uses: pplancq/actions/setup-node@b248bd44a83e2d0c9f9334aff7e33771fdd77c76 # v1.1.2
        with:
          use-mise: 'true'

      - name: Run init script
        run: node scripts/init-template.js

      - name: Remove init files and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm scripts/init-template.js
          git rm .github/workflows/init-template.yaml
          git add package.json package-lock.json
          git commit -m "chore: initialize repository from template"
          git push
